name: Feature Request
description: 提出新功能需求
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        描述你希望 Stars 支持的新功能或改进。

  - type: textarea
    id: problem
    attributes:
      label: 背景 / 问题
      description: 当前遇到了什么限制或不便
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 希望如何实现，可附示例代码或 API 设计
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 是否尝试过其他绕过方式

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - stars-core（核心框架）
        - stars-plugin-api（插件 SDK）
        - 热插拔机制
        - 构建/部署流程
        - 文档
        - 其他
    validations:
      required: true
